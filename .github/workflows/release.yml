name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download release binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          cd packages/core
          mkdir -p dist/liteai-linux-x64-musl/bin dist/liteai-linux-arm64-musl/bin
          gh release download "$TAG" --pattern "liteai-linux-x64-musl.tar.gz" --dir /tmp
          gh release download "$TAG" --pattern "liteai-linux-arm64-musl.tar.gz" --dir /tmp
          tar -xzf /tmp/liteai-linux-x64-musl.tar.gz -C dist/liteai-linux-x64-musl/bin
          tar -xzf /tmp/liteai-linux-arm64-musl.tar.gz -C dist/liteai-linux-arm64-musl/bin

      - name: Extract version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.event.release.prerelease }}" == "true" ]]; then
            echo "latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "latest=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: packages/core
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/liteaiagent/liteai:${{ steps.version.outputs.version }}
            ${{ steps.version.outputs.latest == 'true' && 'ghcr.io/liteaiagent/liteai:latest' || '' }}
